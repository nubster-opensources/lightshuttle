namespace: shop
services:
  api:
    replicas: 1
    image:
      repository: alpine
      tag: '3.20'
      pullPolicy: IfNotPresent
    env:
      LOG_LEVEL: info
    secrets:
      API_TOKEN: '***'
  cache:
    replicas: 1
    image:
      repository: redis
      tag: 7-alpine
      pullPolicy: IfNotPresent
  db:
    replicas: 1
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent
    env:
      POSTGRES_DB: db
      POSTGRES_USER: postgres
    secrets:
      POSTGRES_PASSWORD: '***'
