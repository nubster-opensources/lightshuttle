{{- $svc := index .Values.services "cache" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache
  namespace: {{ .Values.namespace }}
  labels:
    app: cache
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: cache
  template:
    metadata:
      labels:
        app: cache
    spec:
      containers:
      - name: cache
        image: "{{ $svc.image.repository }}{{ if $svc.image.digest }}@{{ $svc.image.digest }}{{ else }}:{{ $svc.image.tag }}{{ end }}"
        imagePullPolicy: {{ $svc.image.pullPolicy }}
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: cache-data-0
          mountPath: /data
        args:
        - redis-server
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
          initialDelaySeconds: 5
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
          initialDelaySeconds: 5
      volumes:
      - name: cache-data-0
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: {{ .Values.namespace }}
  labels:
    app: cache
spec:
  selector:
    app: cache
  ports:
  - port: 6379
    targetPort: 6379
