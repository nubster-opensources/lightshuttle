apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: shop
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: alpine:3.20
        imagePullPolicy: IfNotPresent
        envFrom:
        - configMapRef:
            name: worker-config
        - secretRef:
            name: worker-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: shop
  labels:
    app: worker
data:
  DB_URL: postgres://db:5432/app
---
apiVersion: v1
kind: Secret
metadata:
  name: worker-secret
  namespace: shop
  labels:
    app: worker
stringData:
  DB_PASSWORD: '***'
