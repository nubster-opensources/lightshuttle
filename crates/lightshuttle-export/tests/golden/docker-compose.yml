services:
  db:
    image: postgres:16-alpine
    ports:
    - 127.0.0.1:5432:5432
    environment:
      POSTGRES_DB: db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
    volumes:
    - dbdata:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD
      - pg_isready
      - -U
      - postgres
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  cache:
    image: redis:7-alpine
    ports:
    - 127.0.0.1:6379:6379
    volumes:
    - /data
    command:
    - redis-server
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
  api:
    image: alpine:3.20
    ports:
    - 127.0.0.1:8080:80
    environment:
      APP_NAME: shop
      LOG_LEVEL: info
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
  builder:
    image: lightshuttle/shop_builder:dev
    build:
      context: ./app
      dockerfile: Dockerfile
      target: runtime
  worker:
    image: alpine:3.20
volumes:
  dbdata: {}
