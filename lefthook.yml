pre-commit:
  parallel: false
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    test:
      run: cargo test --workspace --all-features

commit-msg:
  commands:
    cog-verify:
      run: cog verify --file {1}
