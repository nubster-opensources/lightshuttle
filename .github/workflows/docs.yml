name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "--cfg docsrs"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build rustdoc
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - name: Build workspace rustdoc
        run: cargo doc --workspace --all-features --no-deps

      - name: Set up root redirect
        shell: bash
        run: |
          echo '<meta http-equiv="refresh" content="0; url=lightshuttle/index.html">' \
            > target/doc/index.html

      - uses: actions/upload-pages-artifact@v5
        with:
          path: target/doc/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
