name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run cargo publish in --dry-run mode (no upload)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Determine publish mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "args=--dry-run" >> "$GITHUB_OUTPUT"
            echo "is_dry=true" >> "$GITHUB_OUTPUT"
            echo "Publishing in DRY-RUN mode"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
            echo "is_dry=false" >> "$GITHUB_OUTPUT"
            echo "Publishing for real to crates.io"
          fi

      - name: Publish lightshuttle-manifest
        run: cargo publish -p lightshuttle-manifest ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish lightshuttle-spec
        run: cargo publish -p lightshuttle-spec ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish lightshuttle-runtime
        run: cargo publish -p lightshuttle-runtime ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish lightshuttle-otel
        run: cargo publish -p lightshuttle-otel ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish lightshuttle-control
        run: cargo publish -p lightshuttle-control ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Wait for index propagation
        if: steps.mode.outputs.is_dry == 'false'
        run: sleep 30

      - name: Publish lightshuttle (facade / CLI)
        run: cargo publish -p lightshuttle ${{ steps.mode.outputs.args }} --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing v$VERSION"

      - name: Extract changelog section
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v v="## [$VERSION]" '
            index($0, v) == 1 {flag=1; next}
            /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            echo "No changelog section found for [$VERSION]; using a placeholder."
            echo "See [CHANGELOG.md](./CHANGELOG.md) for details." > release-notes.md
          fi
          echo "--- Release notes preview ---"
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
