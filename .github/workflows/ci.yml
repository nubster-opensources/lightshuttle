name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - run: cargo test --workspace --all-features --no-fail-fast

  schema:
    name: JSON Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask schema --check
      - run: cargo xtask doc-gen manifest --check
      - run: cargo xtask doc-gen cli --check

  doc-examples:
    name: Validate doc manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: doc-examples
      - run: cargo xtask doc-validate

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check

  msrv-check:
    name: MSRV check (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo +1.88 check --workspace --all-features

  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: cargo-audit
      - run: cargo install --locked cargo-audit
      - run: cargo audit

  validate-export:
    name: Validate export output
    runs-on: ubuntu-latest
    # Non-blocking: relies on third-party tools whose versions drift with
    # the runner image. The ignored tests skip any tool that is missing.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: validate-export
      # docker compose ships with the runner; helm and kubeconform are
      # installed here so all three targets are validated offline.
      # kubeconform replaces kubectl --dry-run, which would contact a
      # cluster API server. Tests skip any tool that is still missing.
      - uses: azure/setup-helm@v5
        with:
          version: latest
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          sudo install kubeconform /usr/local/bin/
      # Run locally with: cargo test -p lightshuttle-export -- --ignored
      - run: cargo test -p lightshuttle-export --test compose_emitter --test kubernetes_emitter --test helm_emitter -- --ignored --nocapture

  integration:
    name: Integration (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: integration
      # ubuntu-latest ships a running Docker daemon. The suite drives it
      # directly; every test runs under a unique project name and tears its
      # own containers and network down through an RAII guard.
      # Run locally with: cargo test -p lightshuttle-runtime -- --ignored
      - run: cargo test -p lightshuttle-runtime --test harness --test integration_docker --test lifecycle_integration --test lifecycle_scenarios --test networking --test secrets_scenarios -- --ignored --nocapture

  bench:
    name: Cold-start benchmark
    runs-on: ubuntu-latest
    # Docker-backed timings vary with the runner and are not a merge gate;
    # the job still runs on every push so the artifact trend is unbroken
    # across releases (see issue #167).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-cold-start
      - run: cargo xtask bench cold-start --out target/bench/cold-start.json
      - uses: actions/upload-artifact@v7
        with:
          name: cold-start-benchmark
          path: target/bench/cold-start.json
          retention-days: 90

  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Linux blocks merges. macOS and Windows are advisory until they are
    # stabilised (see the Support tiers section of the README).
    continue-on-error: ${{ matrix.os != 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: smoke-${{ matrix.os }}
      # Docker-free CLI smoke: parse, strict-validate and export. Runs on
      # every OS, including the Tier 2 targets that have no Docker daemon.
      - run: cargo test -p lightshuttle --test cli_offline -- --ignored --nocapture
      # Real container boot: Linux is the only runner with a Docker daemon.
      - if: matrix.os == 'ubuntu-latest'
        run: cargo test -p lightshuttle --test cli_smoke -- --ignored --nocapture

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: doc
      - run: cargo doc --workspace --all-features --no-deps
