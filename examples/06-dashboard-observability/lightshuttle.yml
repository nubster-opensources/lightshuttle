# yaml-language-server: $schema=https://raw.githubusercontent.com/nubster-opensources/lightshuttle/main/docs/spec/manifest-v0.schema.json
project:
  name: dashboard-demo
  description: "Dashboard on a fixed port, the OpenTelemetry knob and a custom healthcheck"

# Without `port`, the dashboard picks a free random port at `up` time.
dashboard:
  port: 7878

# `enabled: true` is the default; set it to false to skip the bundled
# OpenTelemetry collector entirely.
observability:
  otel:
    enabled: true

resources:
  db:
    postgres:
      version: "16"

  app:
    container:
      image: alpine:3.20
      command: ["sh", "-c", "sleep 2 && touch /tmp/ready && echo ready && sleep 3600"]
      env:
        DATABASE_URL: ${resources.db.url}
      # Custom healthcheck: the resource is only considered ready once
      # the command starts succeeding, and dependents wait for it.
      healthcheck:
        test: ["CMD-SHELL", "test -f /tmp/ready"]
        interval: "1s"
        timeout: "1s"
        retries: 10
        start_period: "2s"
